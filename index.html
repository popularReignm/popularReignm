<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grid dynamique</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .gallery {
      display: grid;
      gap: 2px;
      padding: 2px;
      grid-auto-flow: row dense;
      align-content: start;
    }

    .photo {
      aspect-ratio: 1 / 1; /* carré parfait */
      overflow: hidden;
      background: #111;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Logo */
    .logo-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      z-index: 999;
    }

    .logo {
      width: min(30vw, 300px);
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div class="logo-overlay">
    <img src="PR.png" class="logo" />
  </div>

  <main class="gallery" id="gallery"></main>

  <script>
    const gallery = document.getElementById("gallery");
    const totalPhotos = 110;

    for (let i = 1; i <= totalPhotos; i++) {
        const div = document.createElement("div");
        div.className = "photo";

        const img = document.createElement("img");
        img.src = `images/${i}.jpg`;

        div.appendChild(img);
        gallery.appendChild(div);
    }

    function updateGrid() {
        const gap = 2;
        const width = window.innerWidth;

        const targetSize = 120;

        let cols = Math.floor(width / (targetSize + gap));
        cols = Math.max(3, Math.min(cols, 20));

        gallery.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

        // 🔥 IMPORTANT : force uniformité verticale implicite
        gallery.style.gridAutoRows = `1fr`;
    }

    window.addEventListener("resize", updateGrid);
    updateGrid();
  </script>
</body>
</html>
